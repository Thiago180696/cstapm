<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#080a10;color:#dde2ee;font-family:Georgia,'Times New Roman',serif;min-height:100vh;}

#hdr{position:sticky;top:0;z-index:200;background:#050709;border-bottom:1px solid #1c2235;padding:12px 15px 10px;}
.eye{font-family:monospace;font-size:8px;letter-spacing:3px;color:#c8a84b;margin-bottom:3px;}
h1{font-size:19px;font-weight:900;letter-spacing:2px;color:#dde2ee;text-transform:uppercase;line-height:1.1;}
.hsub{font-size:10px;color:#7a8aaa;margin-top:2px;font-style:italic;}
.stats{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.st{background:#131825;border:1px solid #1c2235;border-radius:5px;padding:5px 9px;text-align:center;min-width:56px;}
.sv{font-size:15px;font-weight:900;font-family:monospace;line-height:1;}
.sl{font-size:8px;color:#4e5872;letter-spacing:.3px;margin-top:2px;}
.bwrap{margin-top:9px;}
.btop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.gpct{font-size:24px;font-weight:900;color:#c8a84b;font-family:monospace;line-height:1;}
.gfrac{font-size:9px;color:#7a8aaa;font-family:monospace;}
.trk{height:6px;border-radius:3px;background:#252e48;overflow:hidden;}
.fll{height:100%;border-radius:3px;background:linear-gradient(90deg,#c8a84b,#f0d080);transition:width .4s;width:0%;}
.flt{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.fb{font-family:monospace;font-size:7px;font-weight:700;padding:3px 6px;border-radius:3px;cursor:pointer;border:1px solid #252e48;background:transparent;color:#7a8aaa;transition:all .15s;white-space:nowrap;}
.fb:hover,.fb.on{background:rgba(200,168,75,.12);border-color:#c8a84b;color:#c8a84b;}

#body{padding:12px 12px 70px;max-width:1260px;margin:0 auto;}

#tbox{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.28);border-radius:7px;padding:10px 12px;margin-bottom:13px;}
.pls{width:8px;height:8px;border-radius:50%;background:#c8a84b;flex-shrink:0;margin-top:4px;animation:pls 1.8s infinite;}
@keyframes pls{0%{box-shadow:0 0 0 0 rgba(200,168,75,.6)}70%{box-shadow:0 0 0 7px rgba(200,168,75,0)}100%{box-shadow:0 0 0 0 rgba(200,168,75,0)}}
.tlbl{font-family:monospace;font-size:8px;letter-spacing:3px;color:#c8a84b;margin-bottom:2px;}
#ttl{font-size:13px;font-weight:700;color:#dde2ee;}
#tdet{font-size:10px;color:#7a8aaa;font-style:italic;margin-top:2px;}
.gbtn{margin-left:auto;font-family:monospace;font-size:9px;font-weight:700;padding:6px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.3);color:#c8a84b;flex-shrink:0;align-self:center;}

.msep{font-family:monospace;font-size:8px;letter-spacing:3px;color:#c8a84b;text-transform:uppercase;padding:5px 0 3px;margin-top:8px;border-top:1px solid #1c2235;}

.wblk{margin-bottom:9px;border:1px solid #1c2235;border-radius:8px;overflow:hidden;}
.wblk.wd{border-color:rgba(61,168,122,.25);}
.whd{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#0e1118;cursor:pointer;user-select:none;}

.wn{font-size:11px;font-weight:900;font-family:monospace;width:28px;height:28px;border-radius:5px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);display:flex;align-items:center;justify-content:center;color:#c8a84b;flex-shrink:0;}
.wi{flex:1;min-width:0;}
.wf{font-size:11px;font-weight:700;color:#dde2ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wm{font-size:9px;color:#7a8aaa;margin-top:2px;font-style:italic;}
.wr{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.wp{font-family:monospace;font-size:12px;font-weight:700;color:#c8a84b;min-width:30px;text-align:right;}
.wbr{width:44px;height:4px;border-radius:2px;background:#252e48;overflow:hidden;}
.wbf{height:100%;border-radius:2px;background:#c8a84b;transition:width .3s;}
.wt{font-size:10px;color:#4e5872;}

.dgrid{display:none;padding:5px 9px 9px;background:#080a10;border-top:1px solid #1c2235;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:5px;}
.dgrid.vis{display:grid;}

.dc{border:1px solid #1c2235;border-left:3px solid #333;border-radius:6px;padding:8px 8px 7px;background:#0e1118;cursor:pointer;position:relative;transition:background .15s;}
.dc:active{background:#131825;}
.dc.done{background:rgba(61,168,122,.06);border-color:rgba(61,168,122,.22);}
.dc.done .dt{text-decoration:line-through;opacity:.45;}
.dc.today{outline:2px solid #c8a84b;outline-offset:1px;}
.dc.past:not(.done){opacity:.5;}
.chk{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;border:1.5px solid #252e48;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s;}
.dc.done .chk{background:#3da87a;border-color:#3da87a;color:#fff;}
.dtop{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.dd{font-family:monospace;font-size:9px;font-weight:700;}
.dbg{font-family:monospace;font-size:7px;font-weight:700;padding:2px 4px;border-radius:2px;}
.dt{font-size:11px;font-weight:700;line-height:1.3;color:#dde2ee;padding-right:20px;margin-bottom:3px;}
.ddt{font-size:9px;color:#7a8aaa;line-height:1.35;font-style:italic;margin-bottom:4px;}
.tgrd{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:3px;}
.ti{background:#0b0e18;border:1px solid #1c2235;border-radius:3px;padding:3px 4px;}
.tl{font-family:monospace;font-size:6px;color:#4e5872;letter-spacing:.2px;}
.tv{font-family:monospace;font-size:8px;font-weight:700;color:#dde2ee;margin-top:1px;}
.ttl{margin-top:4px;font-family:monospace;font-size:8px;color:#c8a84b;font-weight:700;}
.htag{display:inline-block;margin-top:3px;font-family:monospace;font-size:7px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;background:rgba(200,168,75,.15);color:#c8a84b;border:1px solid rgba(200,168,75,.28);}
.ptag{display:inline-block;margin-top:3px;font-family:monospace;font-size:7px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;background:rgba(112,128,144,.15);color:#8090a0;border:1px solid rgba(112,128,144,.3);}

#rbt{position:fixed;bottom:13px;right:13px;z-index:300;background:#131825;border:1px solid #252e48;color:#4e5872;font-family:monospace;font-size:9px;letter-spacing:1px;padding:7px 11px;border-radius:5px;cursor:pointer;}
#rbt:active{border-color:#e05050;color:#e05050;}
#tst{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(14px);background:#181f30;border:1px solid #c8a84b;color:#c8a84b;font-family:monospace;font-size:10px;padding:7px 14px;border-radius:5px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
#tst.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

  var pct=Math.round(done/n*100);
  var pe=document.getElementById('wp'+wi),be=document.getElementById('wbf'+wi),bl=document.getElementById('w'+wi);
  if(pe)pe.textContent=pct+'%';if(be)be.style.width=pct+'%';if(bl)bl.classList.toggle('wd',pct===100);
}
function ug(){
  var total=0,done=0,streak=0,cur=0,idx=0;
  S.forEach(function(s){s.dias.forEach(function(){total++;if(state['d'+idx]){done++;cur++;if(cur>streak)streak=cur;}else cur=0;idx++;});});
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('gp').textContent=pct+'%';
  document.getElementById('gf').textContent=done+' / '+total+' dias';
  document.getElementById('gb').style.width=pct+'%';
  document.getElementById('sd').textContent=done;
  document.getElementById('st2').textContent=total;
  document.getElementById('ss').textContent=streak;
  document.getElementById('sr').textContent=total-done;
}
function goToToday(){if(!tcEl)return;ow(parseInt(tcEl.getAttribute('data-w')));setTimeout(function(){tcEl.scrollIntoView({behavior:'smooth',block:'center'})},150)}
var tt;
function showT(msg){var el=document.getElementById('tst');el.innerHTML=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show')},1800)}
function confirmReset(){
  if(!confirm('Zerar todo o progresso das 18 semanas?'))return;
  state={};ss(state);
  document.querySelectorAll('.dc').forEach(function(c){
    c.classList.remove('done');
    var k=c.querySelector('.chk');if(k)k.innerHTML='';
  });
  S.forEach(function(_,wi){uw(wi)});ug();
}
</script>
