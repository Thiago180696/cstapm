    var sep=document.createElement('div');sep.className='msep';
    sep.textContent=sem.mes_nome.toUpperCase()+' '+new Date(sem.dias[0].isodate).getFullYear();
    we.appendChild(sep);
  }
  var blk=document.createElement('div');blk.className='wblk';blk.id='w'+si;blk.dataset.mes=sem.mes_nome;
  var whd=document.createElement('div');whd.className='whd';whd.onclick=function(){tw(si);};
  whd.innerHTML=
    '<div class="wn">W'+sem.semana+'</div>'+
    '<div class="wi">'+
      '<div class="wf">Sem. '+sem.semana+' &nbsp;&middot;&nbsp; '+sem.wk_start+' &ndash; '+sem.wk_end+'</div>'+
      '<div class="wm">'+sem.foco+'</div>'+
    '</div>'+
    '<div class="wr">'+
      '<span class="wp" id="wp'+si+'">0%</span>'+
      '<div class="wbr"><div class="wbf" id="wbf'+si+'" style="width:0%"></div></div>'+
      '<span class="wt" id="wt'+si+'">&#9660;</span>'+
    '</div>';
  blk.appendChild(whd);
  var gr=document.createElement('div');gr.className='dgrid';gr.id='dg'+si;
  sem.dias.forEach(function(dia){
    var idx=gi,done=!!state['d'+idx],isT=(dia.isodate===TODAY),isPast=(dia.isodate<TODAY);
    var card=document.createElement('div');
    var cls=['dc'];
    if(done)cls.push('done');if(isT)cls.push('today');if(isPast&&!done)cls.push('past');
    card.className=cls.join(' ');card.id='c'+idx;
    card.setAttribute('data-m',dia.materia);card.setAttribute('data-w',si);
    card.style.borderLeftColor=dia.cor;
    var bg=dia.cor+'22',bd=dia.cor+'44';
    var prioKey=PRIO[dia.materia]||'baixa';
    card.innerHTML=
      '<div class="chk">'+(done?'&#10003;':'')+'</div>'+
      '<div class="dtop">'+
        '<span class="dd" style="color:'+dia.cor+'">'+dia.date+'</span>'+
        '<span class="dbg" style="background:'+bg+';color:'+dia.cor+';border:1px solid '+bd+'">'+dia.label+'</span>'+
      '</div>'+
      '<div class="dt">'+dia.conteudo+'</div>'+
      '<div class="ddt">'+dia.det+'</div>'+
      '<div class="tgrd">'+
        '<div class="ti"><div class="tl">TEORIA</div><div class="tv">'+dia.teoria+'</div></div>'+
        '<div class="ti"><div class="tl">LEI SECA</div><div class="tv">'+dia.lei+'</div></div>'+
        '<div class="ti"><div class="tl">QUEST&Otilde;ES</div><div class="tv">'+dia.questoes+'</div></div>'+
        '<div class="ti"><div class="tl">REVIS&Atilde;O</div><div class="tv">'+dia.revisao+'</div></div>'+
      '</div>'+
      '<div class="ttl">&#9201; '+dia.total+'</div>'+
      '<div class="prio-'+prioKey+'">'+PRIO_LBL[prioKey]+'</div>'+
      (isT?'<div class="htag">&#9679; HOJE</div>':'')+
      (isPast&&!done?'<div class="ptag">pendente</div>':'');
    card.onclick=(function(i,w){return function(){td(i,w)}})(idx,si);
    gr.appendChild(card);
    if(isT){tcEl=card;tcDat=dia;}
    gi++;
  });
  blk.appendChild(gr);we.appendChild(blk);uw(si);
});

if(tcEl){
  ow(parseInt(tcEl.getAttribute('data-w')));
  document.getElementById('ttl').textContent=tcDat.conteudo;
  document.getElementById('tdet').textContent=tcDat.materia+' &middot; '+tcDat.total;
}else{
  var isSun=new Date().getDay()===0;
  document.getElementById('ttl').textContent=isSun?'Domingo &mdash; Descanso obrigat&oacute;rio':'Fora do per&iacute;odo do cronograma';
  document.getElementById('tdet').textContent='30/03/2026 &rarr; 11/07/2026';
  document.querySelector('.gbtn').style.display='none';
}
ug();

function ow(wi){var b=document.getElementById('w'+wi),g=document.getElementById('dg'+wi),t=document.getElementById('wt'+wi);if(!b.classList.contains('open')){b.classList.add('open');g.classList.add('vis');t.innerHTML='&#9650;'}}
function tw(wi){var b=document.getElementById('w'+wi),g=document.getElementById('dg'+wi),t=document.getElementById('wt'+wi),op=b.classList.toggle('open');if(op){g.classList.add('vis');t.innerHTML='&#9650;'}else{g.classList.remove('vis');t.innerHTML='&#9660;'}}
function td(idx,wi){
  state['d'+idx]=!state['d'+idx];ss(state);
  var c=document.getElementById('c'+idx);
  if(c){
    c.classList.toggle('done',!!state['d'+idx]);
    if(state['d'+idx])c.classList.remove('past');
    var k=c.querySelector('.chk');if(k)k.innerHTML=state['d'+idx]?'&#10003;':'';
    var pt=c.querySelector('.ptag');if(pt&&state['d'+idx])pt.remove();
  }
  uw(wi);ug();
  showT(state['d'+idx]?'&#10003; Conclu&iacute;do!':'&larr; Desmarcado');
}
function uw(wi){
  var base=0;for(var i=0;i<wi;i++)base+=S[i].dias.length;
  var n=S[wi].dias.length,done=0;
  for(var j=0;j<n;j++){if(state['d'+(base+j)])done++;}
  var pct=Math.round(done/n*100);
  var pe=document.getElementById('wp'+wi),be=document.getElementById('wbf'+wi),bl=document.getElementById('w'+wi);
  if(pe)pe.textContent=pct+'%';if(be)be.style.width=pct+'%';if(bl)bl.classList.toggle('wd',pct===100);
}
function ug(){
  var total=0,done=0,streak=0,cur=0,idx=0;
  S.forEach(function(s){s.dias.forEach(function(){total++;if(state['d'+idx]){done++;cur++;if(cur>streak)streak=cur;}else cur=0;idx++;});});
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('gp').textContent=pct+'%';
  document.getElementById('gf').textContent=done+' / '+total+' dias';
  document.getElementById('gb').style.width=pct+'%';
  document.getElementById('sd').textContent=done;
  document.getElementById('st2').textContent=total;
  document.getElementById('ss').textContent=streak;
  document.getElementById('sr').textContent=total-done;
}
function goToToday(){if(!tcEl)return;ow(parseInt(tcEl.getAttribute('data-w')));setTimeout(function(){tcEl.scrollIntoView({behavior:'smooth',block:'center'})},150)}
var tt;
function showT(msg){var el=document.getElementById('tst');el.innerHTML=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show')},1800)}
function confirmReset(){
  if(!confirm('Zerar todo o progresso das 15 semanas?'))return;
  state={};ss(state);
  document.querySelectorAll('.dc').forEach(function(c){
    c.classList.remove('done');
    var k=c.querySelector('.chk');if(k)k.innerHTML='';
  });
  S.forEach(function(_,wi){uw(wi)});ug();
  showT('Progresso zerado');
}
</script>
</body>
</html>
