*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#080a10;color:#dde2ee;font-family:Georgia,'Times New Roman',serif;min-height:100vh;}

#header{position:sticky;top:0;z-index:200;background:#050709;border-bottom:1px solid #1c2235;padding:13px 16px 11px;}
.eyebrow{font-family:monospace;font-size:8px;letter-spacing:3px;color:#c8a84b;margin-bottom:4px;}
h1{font-size:21px;font-weight:900;letter-spacing:2px;color:#dde2ee;line-height:1.1;text-transform:uppercase;}
.hsub{font-size:10px;color:#7a8aaa;margin-top:2px;font-style:italic;}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.stat{background:#131825;border:1px solid #1c2235;border-radius:5px;padding:5px 10px;text-align:center;min-width:58px;}
.sv{font-size:16px;font-weight:900;font-family:monospace;line-height:1;}
.sl{font-size:8px;color:#4e5872;letter-spacing:.4px;margin-top:2px;}
.bar-wrap{margin-top:10px;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.gpct{font-size:26px;font-weight:900;color:#c8a84b;font-family:monospace;line-height:1;}
.gfrac{font-size:9px;color:#7a8aaa;font-family:monospace;}
.track{height:6px;border-radius:3px;background:#252e48;overflow:hidden;}
.fill-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#c8a84b,#f0d080);transition:width .4s ease;width:0%;}
.filters{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px;}
.fb{font-family:monospace;font-size:8px;font-weight:700;padding:3px 7px;border-radius:3px;cursor:pointer;border:1px solid #252e48;background:transparent;color:#7a8aaa;transition:all .15s;white-space:nowrap;}
.fb:hover,.fb.on{background:rgba(200,168,75,.12);border-color:#c8a84b;color:#c8a84b;}

#body{padding:13px 12px 70px;max-width:1260px;margin:0 auto;}

#today-box{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.28);border-radius:7px;padding:10px 12px;margin-bottom:14px;}
.pulse{width:9px;height:9px;border-radius:50%;background:#c8a84b;flex-shrink:0;margin-top:4px;animation:pulse 1.8s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,168,75,.6)}70%{box-shadow:0 0 0 7px rgba(200,168,75,0)}100%{box-shadow:0 0 0 0 rgba(200,168,75,0)}}
.today-lbl{font-family:monospace;font-size:8px;letter-spacing:3px;color:#c8a84b;margin-bottom:2px;}
#today-title{font-size:13px;font-weight:700;color:#dde2ee;}
#today-det{font-size:10px;color:#7a8aaa;font-style:italic;margin-top:2px;}
.go-btn{margin-left:auto;font-family:monospace;font-size:9px;font-weight:700;padding:6px 11px;border-radius:4px;cursor:pointer;letter-spacing:1px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.3);color:#c8a84b;flex-shrink:0;align-self:center;}

.mes-sep{font-family:monospace;font-size:9px;letter-spacing:3px;color:#c8a84b;text-transform:uppercase;padding:6px 0 3px;margin-top:8px;border-top:1px solid #1c2235;}

.week-block{margin-bottom:10px;border:1px solid #1c2235;border-radius:8px;overflow:hidden;}
.week-block.wdone{border-color:rgba(61,168,122,.28);}
.week-head{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#0e1118;cursor:pointer;user-select:none;}
.week-head:active{background:#131825;}
.wnum{font-size:12px;font-weight:900;font-family:monospace;width:30px;height:30px;border-radius:5px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);display:flex;align-items:center;justify-content:center;color:#c8a84b;flex-shrink:0;}
.winfo{flex:1;min-width:0;}
.wfoco{font-size:12px;font-weight:700;color:#dde2ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wmeta{font-size:9px;color:#7a8aaa;margin-top:2px;font-style:italic;}
.wright{display:flex;align-items:center;gap:7px;flex-shrink:0;}

.wbar-wrap{width:46px;height:4px;border-radius:2px;background:#252e48;overflow:hidden;}
.wbar-fill{height:100%;border-radius:2px;background:#c8a84b;transition:width .3s;}
.wtog{font-size:11px;color:#4e5872;}

.days-grid{display:none;padding:5px 10px 10px;background:#080a10;border-top:1px solid #1c2235;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:5px;}
.days-grid.visible{display:grid;}

.day-card{border:1px solid #1c2235;border-left:3px solid #333;border-radius:6px;padding:8px 8px 7px;background:#0e1118;cursor:pointer;position:relative;transition:background .15s;}
.day-card:active{background:#131825;}
.day-card.done{background:rgba(61,168,122,.06);border-color:rgba(61,168,122,.22);}
.day-card.done .dt{text-decoration:line-through;opacity:.48;}
.day-card.is-today{outline:2px solid #c8a84b;outline-offset:1px;}
.chk{position:absolute;top:7px;right:7px;width:15px;height:15px;border-radius:50%;border:1.5px solid #252e48;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;transition:all .15s;}
.day-card.done .chk{background:#3da87a;border-color:#3da87a;color:#fff;}
.dtop{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.ddate{font-family:monospace;font-size:9px;font-weight:700;}
.dbadge{font-family:monospace;font-size:7px;font-weight:700;letter-spacing:.3px;padding:1px 4px;border-radius:3px;}
.dt{font-size:11px;font-weight:700;line-height:1.3;color:#dde2ee;padding-right:18px;margin-bottom:4px;}
.dd{font-size:9px;color:#7a8aaa;line-height:1.4;font-style:italic;margin-bottom:3px;}
.tempos{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:3px;}
.ti{background:#0b0e18;border:1px solid #1c2235;border-radius:3px;padding:3px 4px;}
.tl{font-family:monospace;font-size:6px;color:#4e5872;letter-spacing:.3px;}
.tv{font-family:monospace;font-size:8px;font-weight:700;color:#dde2ee;margin-top:1px;}
.total-line{margin-top:4px;font-family:monospace;font-size:8px;color:#c8a84b;font-weight:700;}
.today-tag{display:inline-block;margin-top:3px;font-family:monospace;font-size:7px;font-weight:700;letter-spacing:1px;padding:1px 5px;border-radius:3px;background:rgba(200,168,75,.15);color:#c8a84b;border:1px solid rgba(200,168,75,.28);}

#reset-btn{position:fixed;bottom:14px;right:14px;z-index:300;background:#131825;border:1px solid #252e48;color:#4e5872;font-family:monospace;font-size:9px;letter-spacing:1px;padding:7px 12px;border-radius:5px;cursor:pointer;}
#reset-btn:active{border-color:#e05050;color:#e05050;}
#toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(14px);background:#181f30;border:1px solid #c8a84b;color:#c8a84b;font-family:monospace;font-size:10px;padding:7px 15px;border-radius:5px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

    activeF=f;
    document.querySelectorAll('.fb').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    applyFilter();
  };
  fwrap.appendChild(b);
});
function applyFilter(){
  document.querySelectorAll('.day-card').forEach(function(c){
    c.style.display=(activeF==='todos'||c.getAttribute('data-mat')===activeF)?'':'none';
  });
}

/* RENDER */
var weeksEl=document.getElementById('weeks');
var todayCardEl=null, todayData=null;
var globalIdx=0, prevMes=0;

SEMANAS.forEach(function(sem,si){
  if(sem.mes!==prevMes){
    var ml=document.createElement('div');
    ml.className='mes-sep';
    ml.textContent='── '+sem.mes_nome.toUpperCase()+' / 2026 ──────────────';
    weeksEl.appendChild(ml);
    prevMes=sem.mes;
  }

  var block=document.createElement('div');
  block.className='week-block';
  block.id='wk-'+si;

  var head=document.createElement('div');
  head.className='week-head';
  head.innerHTML=
    '<div class="wnum">'+sem.semana+'</div>'+
    '<div class="winfo">'+
      '<div class="wfoco">Sem.'+sem.semana+' &nbsp;·&nbsp; '+sem.foco+'</div>'+
      '<div class="wmeta">'+sem.wk_start+' &rarr; '+sem.wk_end+' &nbsp;·&nbsp; '+sem.mes_nome+'</div>'+
    '</div>'+
    '<div class="wright">'+
      '<div class="wpct" id="wpct-'+si+'">0%</div>'+
      '<div class="wbar-wrap"><div class="wbar-fill" id="wbar-'+si+'" style="width:0%"></div></div>'+
      '<div class="wtog" id="wtog-'+si+'">&#9660;</div>'+
    '</div>';
  head.onclick=(function(i){ return function(){ toggleWeek(i); }; })(si);
  block.appendChild(head);

  var grid=document.createElement('div');
  grid.className='days-grid';
  grid.id='dgrid-'+si;
  block.appendChild(grid);

  sem.dias.forEach(function(dia){
    var idx=globalIdx;
    var isDone=!!state['d'+idx];
    var isToday=(dia.isodate===TODAY_ISO);

    var card=document.createElement('div');
    var cls=['day-card'];
    if(isDone)  cls.push('done');
    if(isToday) cls.push('is-today');
    card.className=cls.join(' ');
    card.id='day-'+idx;
    card.setAttribute('data-mat',dia.materia);
    card.setAttribute('data-week',si);
    card.style.borderLeftColor=dia.cor;

    var bg=dia.cor+'22', bdr=dia.cor+'44';
    card.innerHTML=
      '<div class="chk">'+(isDone?'&#10003;':'')+'</div>'+
      '<div class="dtop">'+
        '<span class="ddate" style="color:'+dia.cor+'">'+dia.date+'</span>'+
        '<span class="dbadge" style="background:'+bg+';color:'+dia.cor+';border:1px solid '+bdr+'">'+dia.label+'</span>'+
      '</div>'+
      '<div class="dt">'+dia.conteudo+'</div>'+
      '<div class="dd">'+dia.materia+'</div>'+
      '<div class="tempos">'+
        '<div class="ti"><div class="tl">TEORIA</div><div class="tv">'+dia.teoria+'</div></div>'+
        '<div class="ti"><div class="tl">LEI SECA</div><div class="tv">'+dia.lei+'</div></div>'+
        '<div class="ti"><div class="tl">QUEST&Otilde;ES</div><div class="tv">'+dia.questoes+'</div></div>'+
        '<div class="ti"><div class="tl">REVIS&Atilde;O</div><div class="tv">'+dia.revisao+'</div></div>'+
      '</div>'+
      '<div class="total-line">&#9201; '+dia.total+'</div>'+
      (isToday?'<div class="today-tag">&#9679; HOJE</div>':'');

    card.onclick=(function(i,w){ return function(){ toggleDay(i,w); }; })(idx,si);
    grid.appendChild(card);
    if(isToday){ todayCardEl=card; todayData=dia; }
    globalIdx++;
  });

  weeksEl.appendChild(block);
  updateWeek(si);
});

/* Abre semana de hoje automaticamente */
if(todayCardEl){
  var tw=parseInt(todayCardEl.getAttribute('data-week'));
  openWeek(tw);
  document.getElementById('today-title').textContent=todayData.conteudo;
  document.getElementById('today-det').textContent=todayData.materia+' · '+todayData.total;
} else {
  document.getElementById('today-title').textContent='Nenhuma aula agendada hoje';
  document.getElementById('today-det').textContent='19/03/2026 → 15/07/2026';
  document.querySelector('.go-btn').style.display='none';
}
updateGlobal();

/* ─── FUNÇÕES ─── */
function openWeek(wi){
  var b=document.getElementById('wk-'+wi);
  var g=document.getElementById('dgrid-'+wi);
  var t=document.getElementById('wtog-'+wi);
  if(!b.classList.contains('open')){
    b.classList.add('open');
    g.classList.add('visible');
    t.innerHTML='&#9650;';
  }
}
function toggleWeek(wi){
  var b=document.getElementById('wk-'+wi);
  var g=document.getElementById('dgrid-'+wi);
  var t=document.getElementById('wtog-'+wi);
  var open=b.classList.toggle('open');
  if(open){ g.classList.add('visible'); t.innerHTML='&#9650;'; }
  else     { g.classList.remove('visible'); t.innerHTML='&#9660;'; }
}
function toggleDay(idx,wi){
  state['d'+idx]=!state['d'+idx];
  saveState(state);
  var c=document.getElementById('day-'+idx);
  if(c){
    c.classList.toggle('done',!!state['d'+idx]);
    var k=c.querySelector('.chk');
    if(k) k.innerHTML=state['d'+idx]?'&#10003;':'';
  }
  updateWeek(wi);
  updateGlobal();
  showToast(state['d'+idx]?'&#10003; Dia concluído!':'↩ Desmarcado');
}
function updateWeek(wi){
  var base=0;
  for(var i=0;i<wi;i++) base+=SEMANAS[i].dias.length;
  var n=SEMANAS[wi].dias.length, done=0;
  for(var j=0;j<n;j++){ if(state['d'+(base+j)]) done++; }
  var pct=Math.round(done/n*100);
  var pe=document.getElementById('wpct-'+wi);
  var be=document.getElementById('wbar-'+wi);
  var bl=document.getElementById('wk-'+wi);
  if(pe) pe.textContent=pct+'%';
  if(be) be.style.width=pct+'%';
  if(bl) bl.classList.toggle('wdone',pct===100);
}
function updateGlobal(){
  var total=0, done=0, streak=0, cur=0, idx=0;
  SEMANAS.forEach(function(s){
    s.dias.forEach(function(){
      total++;
      if(state['d'+idx]){ done++; cur++; if(cur>streak) streak=cur; } else cur=0;
      idx++;
    });
  });
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('g-pct').textContent=pct+'%';
  document.getElementById('g-frac').textContent=done+' / '+total+' dias';
  document.getElementById('g-bar').style.width=pct+'%';
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-streak').textContent=streak;
  document.getElementById('s-remain').textContent=total-done;
}
function goToToday(){
  if(!todayCardEl) return;
  var wi=parseInt(todayCardEl.getAttribute('data-week'));
  openWeek(wi);
  setTimeout(function(){ todayCardEl.scrollIntoView({behavior:'smooth',block:'center'}); },150);
}
var toastTimer;
function showToast(msg){
  var el=document.getElementById('toast');
  el.innerHTML=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },1800);
}
function confirmReset(){
  if(!confirm('Zerar todo o progresso?')) return;
  state={}; saveState(state);
  document.querySelectorAll('.day-card').forEach(function(c){
    c.classList.remove('done');
    var k=c.querySelector('.chk'); if(k) k.innerHTML='';
  });
  SEMANAS.forEach(function(_,wi){ updateWeek(wi); });
  updateGlobal();
}
</script>
</body>
</html>
